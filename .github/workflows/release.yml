name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build -ldflags="-s -w" -o procir.exe ./cmd/procir/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: procir.exe
          generate_release_notes: false
          body_path: release_notes.md
