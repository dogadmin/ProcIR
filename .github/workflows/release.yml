name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [386, amd64, arm64]
        include:
          - goarch: 386
            suffix: x86
          - goarch: amd64
            suffix: amd64
          - goarch: arm64
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w" -o procir_windows_${{ matrix.suffix }}.exe ./cmd/procir/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: procir_windows_${{ matrix.suffix }}
          path: procir_windows_${{ matrix.suffix }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: procir_windows_*.exe
          generate_release_notes: false
          body_path: release_notes.md
